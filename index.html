<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f4f9;}
    #reader { width: 100%; max-width: 500px; margin: 10px auto; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    #result { margin-top: 20px; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 8px; }
    .success { background-color: #d4edda; color: #155724; }
    .error { background-color: #f8d7da; color: #721c24; }
    .processing { background-color: #e2e2e2; color: #333; }
    button { padding: 12px 24px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold;}
  </style>
</head>
<body>
  <h2>Awards Night Scanner</h2>
  <button id="startBtn" onclick="startScanner()">Start Camera Scanner</button>
  <div id="reader"></div>
  <div id="result">Click Start to scan...</div>

  <script>
    var isProcessing = false;
    
    // ඔයාගේ Google Web App ලින්ක් එක
    var googleScriptUrl = "https://script.google.com/a/macros/sdf.lk/s/AKfycbzXtBUc9TO28jdfBhpdoviEyVfwDWJGgOCQFiCoDIb5Cr2IsSjYaIYxfeNTegImEEHw/exec"; 

    function onScanSuccess(decodedText, decodedResult) {
      if(isProcessing) return;
      isProcessing = true;
      
      var resDiv = document.getElementById('result');
      resDiv.className = "processing";
      resDiv.innerText = "Processing " + decodedText + "...";

      // අලුත් Fetch Code එක
      var url = googleScriptUrl + "?empNo=" + encodeURIComponent(decodedText);
      
      fetch(url, { mode: 'no-cors' })
      .then(function() {
           resDiv.innerText = "✅ " + decodedText + " ස්කෑන් වුණා!";
           resDiv.className = "success";
           
           setTimeout(function() {
             isProcessing = false;
             resDiv.innerText = "Ready for next scan...";
             resDiv.className = "";
           }, 2000); // තත්පර 2කින් ඊළඟ එකට ලෑස්ති වෙනවා
      })
      .catch(function(err) {
          resDiv.innerText = "Connection Error!";
          resDiv.className = "error";
          isProcessing = false;
      });
    }

    function startScanner() {
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('result').innerText = "Waiting for QR code...";
      var html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} });
      html5QrcodeScanner.render(onScanSuccess);
    }
  </script>
</body>
</html>
